[window]
decorations = "None"          # 对应 RESIZE（无标题栏）
opacity = 0.7                 # 对应 window_background_opacity
padding = { x = 2, y = 0 }   # 对应 window_padding
blur = true

dimensions = { columns = 120, lines = 35 }
[terminal]
shell = { program = "nu"}

[font]
size = 16.0

[font.normal]
family = "IntoneMono Nerd Font Mono"

# 对应 tokyonight-storm 配色
[colors.primary]
background = "#24283b"
foreground = "#c0caf5"

[colors.normal]
black   = "#1d202f"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#a9b1d6"

[colors.bright]
black   = "#414868"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#bb9af7"
cyan    = "#7dcfff"
white   = "#c0caf5"

[colors.cursor]
cursor = "#c0caf5"
text   = "#24283b"

[colors.selection]
background = "#364a82"
text       = "CellForeground"

[general]
live_config_reload = true
working_directory = "C:\\Users\\Administrator"

[selection]
save_to_clipboard = true

# 键位绑定
[keyboard]
bindings = [
  # Ctrl+V 直接发送（给终端程序用）
  #{ key = "V", mods = "Control", action = "ReceiveChar" },
]

# 鼠标绑定
[mouse]
bindings= [
  { mouse = "Right", action = "PasteSelection" }
]
hide_when_typing = false
