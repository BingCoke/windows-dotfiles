[opener]
edit = [
  { run = "nvim %s", desc = "nvim", block = true, for = "windows" },
  { run = "${EDITOR:-vi} %s", desc = "$EDITOR", block = true, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = "edit" },

  { url = "*.md", use = "edit" },
  { url = "*.txt", use = "edit" },
  { url = "*.toml", use = "edit" },
  { url = "*.json", use = "edit" },
  { url = "*.yaml", use = "edit" },
  { url = "*.yml", use = "edit" },
  { url = "*.lua", use = "edit" },
  { url = "*.py", use = "edit" },
  { url = "*.js", use = "edit" },
  { url = "*.ts", use = "edit" },
  { url = "*.tsx", use = "edit" },
  { url = "*.jsx", use = "edit" },
  { url = "*.rs", use = "edit" },
  { url = "*.go", use = "edit" },
  { url = "*.c", use = "edit" },
  { url = "*.cpp", use = "edit" },
  { url = "*.h", use = "edit" },
  { url = "*.hpp", use = "edit" },
  { url = "*.ps1", use = "edit" },
]
